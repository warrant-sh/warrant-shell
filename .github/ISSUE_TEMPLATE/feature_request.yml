name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for warrant-shell? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
      placeholder: "When running wsh with multiple agents, I can't easily see which agent triggered which audit entry..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
      description: Describe your proposed solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternative approaches?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of wsh does this relate to?
      options:
        - Policy / capabilities
        - Manifests / presets
        - CLI / UX
        - Audit trail
        - Elevation
        - Profiles / projects
        - Integration (agent frameworks)
        - Documentation
        - Other

  - type: checkboxes
    id: contribution
    attributes:
      label: Would you be willing to contribute this?
      options:
        - label: I'd be interested in implementing this myself
